spring.application.name=demo

management.endpoints.web.exposure.include=health,info,metrics
management.cloudwatch.metrics.export.enabled=${CLOUDWATCH_METRICS_EXPORT_ENABLED:true}
management.cloudwatch.metrics.export.namespace=${CLOUDWATCH_METRICS_NAMESPACE:Demo/ProductService}
management.cloudwatch.metrics.export.step=${CLOUDWATCH_METRICS_STEP:1m}
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${APP_ENV:dev}

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%level service=${spring.application.name} env=${APP_ENV:dev} trace_id=%X{trace_id:-0} span_id=%X{span_id:-0} logger=%logger{36} thread=%thread message="%msg"%n%ex
